buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24"
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Forcer versions Kotlin/coroutines compatibles dans tous les sous-projets
// afterEvaluate + eachDependency évite de casser les variants AGP
subprojects {
    afterEvaluate { proj ->
        proj.configurations.all { config ->
            config.resolutionStrategy.eachDependency { details ->
                def g = details.requested.group
                def n = details.requested.name
                if (g == 'org.jetbrains.kotlinx' && n.startsWith('kotlinx-coroutines')) {
                    details.useVersion '1.8.1'
                    details.because 'Force coroutines compatibles Kotlin 1.9.24'
                }
                if (g == 'org.jetbrains.kotlin' && n.startsWith('kotlin-stdlib')) {
                    details.useVersion '1.9.24'
                    details.because 'Force kotlin-stdlib 1.9.24'
                }
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
