buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // FIX FINAL : kotlinx-coroutines:1.10.2 et kotlin-stdlib:2.1.0 sont tirés
        // en transitif par androidx.activity:1.11.0 et core:1.17.0.
        // Kotlin 1.9.24 ne peut pas lire les métadonnées 2.1.0 → erreurs en cascade.
        // Montée à Kotlin 2.1.0 : compatible stdlib 2.1.0 + coroutines 1.10.2.
        classpath 'com.android.tools.build:gradle:8.9.1'
        classpath 'com.google.gms:google-services:4.4.4'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.0"
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Fix allWarningsAsErrors pour @capacitor/geolocation@8.2.0
subprojects {
    afterEvaluate {
        tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
            kotlinOptions {
                allWarningsAsErrors = false
            }
        }
    }
}
