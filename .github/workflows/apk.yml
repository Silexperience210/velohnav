name: Build VelohNav APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# FIX: permissions explicites pour softprops/action-gh-release
permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install JS dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run

      - name: Build web assets (Vite)
        run: npm run build

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Inject local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK (signé)
        id: release_build
        working-directory: android
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:    ${{ secrets.KEY_ALIAS }}
          KEY_PWD:      ${{ secrets.KEY_PASSWORD }}
          STORE_PWD:    ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "KEYSTORE_BASE64 non configuré — release ignorée"
            echo "signed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 --decode > app/velohnav-release.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$PWD/app/velohnav-release.jks" \
            -Pandroid.injected.signing.store.password="$STORE_PWD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PWD" \
            --no-daemon
          rm -f app/velohnav-release.jks
          echo "signed=true" >> $GITHUB_OUTPUT

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VelohNav-AR-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        if: steps.release_build.outputs.signed == 'true'
        with:
          name: VelohNav-AR-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: APK size
        run: |
          echo "=== Debug ===" && du -h android/app/build/outputs/apk/debug/app-debug.apk
          [ -f android/app/build/outputs/apk/release/app-release.apk ] && \
            echo "=== Release ===" && du -h android/app/build/outputs/apk/release/app-release.apk || true

      # Attacher l'APK à la GitHub Release — uniquement sur tag v*
      # FIX 1: permissions contents:write en haut du fichier
      # FIX 2: release APK conditionnel (seulement si keystore configuré)
      # FIX 3: fail_on_unmatched_files: false pour ne pas crasher sans release APK
      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
