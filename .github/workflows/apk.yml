name: Build VelohNav APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install JS dependencies
        run: npm ci

      - name: Build web assets (Vite)
        run: npm run build

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Inject local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VelohNav-AR-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK size
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          echo "✅ APK built — $(du -h $APK | cut -f1)"
