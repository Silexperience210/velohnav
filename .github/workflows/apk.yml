name: Build VelohNav APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install JS dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run

      - name: Build web assets (Vite)
        run: npm run build

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Inject local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Release APK signé (seulement si KEYSTORE_BASE64 est configuré) ──
      - name: Build release APK (signé)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: android
        env:
          KEYSTORE_BASE64:    ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:     ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/velohnav-release.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/velohnav-release.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon
          rm -f app/velohnav-release.jks

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VelohNav-AR-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK (si signé)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: VelohNav-AR-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: APK size
        run: |
          echo "=== Debug ===" && du -h android/app/build/outputs/apk/debug/app-debug.apk
          [ -f android/app/build/outputs/apk/release/app-release.apk ] && \
            echo "=== Release ===" && du -h android/app/build/outputs/apk/release/app-release.apk || true
